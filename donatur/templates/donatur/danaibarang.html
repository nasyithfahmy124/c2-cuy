<!DOCTYPE html>
<html>

<head>
    <title>Donasi Barang</title>
</head>

<body>

    <h2>Form Donasi Barang</h2>

    <form method="post">
        {% csrf_token %}

        <!-- FORM UTAMA -->
        {{ form.as_p }}

        <h3>Daftar Barang</h3>

        <!-- WAJIB -->
        {{ formset.management_form }}

        <div id="formset-wrapper">
            {% for f in formset %}
            <div class="item-form" style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">

                <p>
                    {{ f.kebutuhan.label }}<br>
                    {{ f.kebutuhan }}
                </p>

                <p>
                    Harga Satuan:
                    <span class="harga-satuan">-</span>
                </p>

                <p>
                    {{ f.jumlah.label }}<br>
                    {{ f.jumlah }}
                </p>

                <p>
                    Subtotal:
                    <span class="subtotal">0</span>
                </p>

            </div>
            {% endfor %}
        </div>

        <button type="button" onclick="tambahForm()">+ Tambah Barang</button>
        <br><br>

        <button type="submit">Kirim Donasi</button>
    </form>

    <script>
        function tambahForm() {
            let totalForms = document.getElementById("id_form-TOTAL_FORMS");
            let currentCount = parseInt(totalForms.value);

            let wrapper = document.getElementById("formset-wrapper");
            let firstForm = wrapper.children[0].cloneNode(true);

            let elements = firstForm.querySelectorAll("input, select, textarea, label, span");

            elements.forEach(el => {
                if (el.name) {
                    el.name = el.name.replace(/form-\d+-/, `form-${currentCount}-`);
                }
                if (el.id) {
                    el.id = el.id.replace(/form-\d+-/, `form-${currentCount}-`);
                }

                // reset input
                if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
                    if (el.type === "checkbox") {
                        el.checked = false;
                    } else {
                        el.value = "";
                    }
                }

                // reset select
                if (el.tagName === "SELECT") {
                    el.selectedIndex = 0;
                }

                // reset tampilan harga & subtotal
                if (el.classList.contains("harga-satuan")) {
                    el.innerText = "-";
                }

                if (el.classList.contains("subtotal")) {
                    el.innerText = "0";
                }

                // update label
                if (el.tagName === "LABEL" && el.htmlFor) {
                    el.htmlFor = el.htmlFor.replace(/form-\d+-/, `form-${currentCount}-`);
                }
            });

            wrapper.appendChild(firstForm);
            totalForms.value = currentCount + 1;
        }

        // tampilkan harga saat pilih barang
        document.addEventListener("change", function (e) {
            if (e.target.name.includes("kebutuhan")) {
                let select = e.target;
                let selectedText = select.options[select.selectedIndex].text;

                let harga = selectedText.split("Rp")[1] || "0";

                let parent = select.closest(".item-form");
                parent.querySelector(".harga-satuan").innerText = "Rp" + harga;
            }
        });

        // hitung subtotal
        document.addEventListener("input", function (e) {
            if (e.target.name.includes("jumlah")) {
                let parent = e.target.closest(".item-form");

                let hargaText = parent.querySelector(".harga-satuan").innerText.replace("Rp", "") || 0;
                let jumlah = e.target.value || 0;

                let subtotal = parseInt(hargaText) * parseInt(jumlah);

                parent.querySelector(".subtotal").innerText = subtotal;
            }
        });
    </script>

</body>

</html>
