{% load static %}

<style>
    .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .project-card {
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .project-card:hover {
        transform: translateY(-5px);
        box-shadow:
            0 20px 25px -5px rgba(0, 0, 0, 0.05),
            0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }

    .hide-scrollbar {
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .animate-fade {
        animation: fade .8s ease forwards;
    }

    nav a {
        transform: translateY(0);
    }

    nav a:hover {
        transform: translateY(-2px);
    }

    @keyframes fade {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<!-- ================= NAVBAR DONATUR ================= -->

<header class="fixed top-0 inset-x-0 z-50 px-4 lg:px-8 pt-4">

    <div
        class="max-w-7xl mx-auto glass rounded-full border border-white/60 shadow-[0_10px_40px_rgba(0,0,0,0.08)] px-5 lg:px-7 py-4 flex items-center justify-between">

        <!-- LOGO -->
        <a href="{% url 'home_d' %}" class="flex items-center gap-3">

            <img src="{% static 'assets/logo/Asset3.png' %}" alt="logo"
                class="h-10 w-auto object-contain transition-transform duration-300 hover:scale-105">

        </a>

        <!-- DESKTOP MENU -->
        <nav class="hidden lg:flex items-center gap-3 rounded-full px-4 py-3">

            <!-- BERANDA -->
            <a href="{% url 'home_d' %}"
                class="relative group px-5 py-2.5 rounded-full overflow-hidden transition-all duration-500">

                <span
                    class="absolute inset-0 bg-[#7BBE21]/50 opacity-0 group-hover:opacity-100 transition-all duration-500 rounded-full"></span>

                <span
                    class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-gradient-to-r from-emerald-400 to-cyan-400 group-hover:w-3/4 group-hover:left-[12%] transition-all duration-500 rounded-full shadow-[0_0_14px_rgba(16,185,129,0.6)]"></span>

                <span
                    class="relative z-10 font-semibold text-[#007934] group-hover:text-emerald-600 transition-colors duration-300">
                    Beranda
                </span>

            </a>

            <!-- RIWAYAT -->
            <a href="{% url 'riwayat_d' %}"
                class="relative group px-5 py-2.5 rounded-full overflow-hidden transition-all duration-500">

                <span
                    class="absolute inset-0 bg-[#7BBE21]/50 opacity-0 group-hover:opacity-100 transition-all duration-500 rounded-full"></span>

                <span
                    class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-gradient-to-r from-emerald-400 to-cyan-400 group-hover:w-3/4 group-hover:left-[12%] transition-all duration-500 rounded-full shadow-[0_0_14px_rgba(16,185,129,0.6)]"></span>

                <span
                    class="relative z-10 font-semibold text-[#007934] group-hover:text-emerald-600 transition-colors duration-300">
                    Riwayat
                </span>

            </a>

            <!-- LAPORAN -->
            <a href="{% url 'laporan_donatur' %}"
                class="relative group px-5 py-2.5 rounded-full overflow-hidden transition-all duration-500">

                <span
                    class="absolute inset-0 bg-[#7BBE21]/50 opacity-0 group-hover:opacity-100 transition-all duration-500 rounded-full"></span>

                <span
                    class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-gradient-to-r from-emerald-400 to-cyan-400 group-hover:w-3/4 group-hover:left-[12%] transition-all duration-500 rounded-full shadow-[0_0_14px_rgba(16,185,129,0.6)]"></span>

                <span
                    class="relative z-10 font-semibold text-[#007934] group-hover:text-emerald-600 transition-colors duration-300">
                    Laporan
                </span>

            </a>

            <!-- BANTUAN -->
            <a href="{% url 'rbantuan' %}"
                class="relative group px-5 py-2.5 rounded-full overflow-hidden transition-all duration-500">

                <span
                    class="absolute inset-0 bg-[#7BBE21]/50 opacity-0 group-hover:opacity-100 transition-all duration-500 rounded-full"></span>

                <span
                    class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-gradient-to-r from-emerald-400 to-cyan-400 group-hover:w-3/4 group-hover:left-[12%] transition-all duration-500 rounded-full shadow-[0_0_14px_rgba(16,185,129,0.6)]"></span>

                <span
                    class="relative z-10 font-semibold text-[#007934] group-hover:text-emerald-600 transition-colors duration-300">
                    Bantuan
                </span>

            </a>

            <!-- BAGI HASIL -->
            <a href="{% url 'bagihasil' %}"
                class="relative group px-5 py-2.5 rounded-full overflow-hidden transition-all duration-500">

                <span
                    class="absolute inset-0 bg-[#7BBE21]/50 opacity-0 group-hover:opacity-100 transition-all duration-500 rounded-full"></span>

                <span
                    class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-gradient-to-r from-emerald-400 to-cyan-400 group-hover:w-3/4 group-hover:left-[12%] transition-all duration-500 rounded-full shadow-[0_0_14px_rgba(16,185,129,0.6)]"></span>

                <span
                    class="relative z-10 font-semibold text-[#007934] group-hover:text-emerald-600 transition-colors duration-300">
                    Bagi Hasil
                </span>

            </a>

        </nav>

        <!-- ACTION -->
        <div class="flex items-center gap-3">

            <!-- PROFILE -->
            <div class="relative group hidden sm:block">

                <button
                    class="flex items-center gap-3 pl-3 pr-5 py-2.5 rounded-full bg-white/70 backdrop-blur-2xl border border-white/40 shadow-[0_10px_30px_rgba(15,23,42,0.08)] hover:shadow-[0_15px_40px_rgba(16,185,129,0.15)] hover:-translate-y-0.5 transition-all duration-300">

                    <!-- AVATAR -->
                    <div
                        class="relative w-11 h-11 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-400 flex items-center justify-center shadow-lg shadow-emerald-500/20 overflow-hidden">

                        <span class="text-white font-extrabold text-sm uppercase">
                            {{ request.user.username|slice:":1" }}
                        </span>

                        <span
                            class="absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full bg-lime-400 border-2 border-white"></span>

                    </div>

                    <!-- USER INFO -->
                    <div class="flex flex-col items-start leading-tight">

                        <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">
                            Donatur Aktif
                        </span>

                        <span class="text-sm font-bold text-slate-800 max-w-[120px] truncate">
                            {{ request.user.username }}
                        </span>

                    </div>

                    <!-- ARROW -->
                    <div
                        class="w-8 h-8 rounded-full bg-slate-100 group-hover:bg-emerald-500 transition-all flex items-center justify-center">

                        <i
                            class="ph-bold ph-caret-down text-slate-500 group-hover:text-white transition-colors"></i>

                    </div>

                </button>

                <!-- DROPDOWN -->
                <div
                    class="absolute right-0 top-[120%] w-64 opacity-0 invisible translate-y-3 group-hover:opacity-100 group-hover:visible group-hover:translate-y-0 transition-all duration-300">

                    <div
                        class="overflow-hidden rounded-3xl border border-white/40 bg-white/80 backdrop-blur-2xl shadow-[0_25px_60px_rgba(15,23,42,0.12)] p-3">

                        <!-- HEADER -->
                        <div class="p-4 rounded-2xl bg-gradient-to-br from-emerald-500 to-cyan-500 text-white mb-3">

                            <p class="text-xs uppercase tracking-widest opacity-80 font-semibold">
                                Akun Donatur
                            </p>

                            <h4 class="text-lg font-black truncate mt-1">
                                {{ request.user.username }}
                            </h4>

                        </div>

                        <!-- MENU -->
                        <div class="space-y-1">

                            <a href="{% url 'profile_d' %}"
                                class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-slate-100 transition-all text-slate-700 font-semibold">

                                <i class="ph-bold ph-user text-lg text-emerald-500"></i>
                                Profil Saya

                            </a>

                            <a href="{% url 'riwayat_d' %}"
                                class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-slate-100 transition-all text-slate-700 font-semibold">

                                <i class="ph-bold ph-clock-counter-clockwise text-lg text-cyan-500"></i>
                                Riwayat Donasi

                            </a>

                            <a href="{% url 'laporan_donatur' %}"
                                class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-slate-100 transition-all text-slate-700 font-semibold">

                                <i class="ph-bold ph-chart-line-up text-lg text-orange-500"></i>
                                Analitik

                            </a>

                            <a href="{% url 'bagihasil' %}"
                                class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-slate-100 transition-all text-slate-700 font-semibold">

                                <i class="ph-bold ph-coins text-lg text-lime-500"></i>
                                Bagi Hasil

                            </a>

                            <a href="{% url 'rbantuan' %}"
                                class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-slate-100 transition-all text-slate-700 font-semibold">

                                <i class="ph-bold ph-hand-heart text-lg text-pink-500"></i>
                                Riwayat Bantuan

                            </a>

                            <div class="border-t border-slate-100 my-2"></div>

                            <form action="{% url 'logout' %}" method="POST">
                                {% csrf_token %}

                                <button type="submit"
                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-red-50 transition-all text-red-500 font-bold">

                                    <i class="ph-bold ph-sign-out text-lg"></i>
                                    Keluar

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- MOBILE BUTTON -->
            <button id="mobile-menu-btn"
                class="lg:hidden w-11 h-11 rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-500 shadow-lg shadow-emerald-500/20 flex items-center justify-center text-white">

                <i class="ph-bold ph-list text-2xl"></i>

            </button>

        </div>

    </div>

    <!-- MOBILE MENU -->
    <div id="mobile-menu"
        class="hidden lg:hidden mt-3 glass rounded-3xl p-5 shadow-xl max-w-7xl mx-auto">

        <div class="flex flex-col gap-4 text-sm font-semibold text-slate-700">

            <a href="{% url 'home_d' %}" class="hover:text-emerald-600 transition-all">
                Beranda
            </a>

            <a href="{% url 'riwayat_d' %}" class="hover:text-emerald-600 transition-all">
                Riwayat
            </a>

            <a href="{% url 'laporan_donatur' %}" class="hover:text-emerald-600 transition-all">
                Laporan
            </a>

            <a href="{% url 'rbantuan' %}" class="hover:text-emerald-600 transition-all">
                Bantuan
            </a>

            <a href="{% url 'bagihasil' %}" class="hover:text-emerald-600 transition-all">
                Bagi Hasil
            </a>

            <div class="border-t border-slate-200 pt-4"></div>

            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}

                <button type="submit"
                    class="text-red-500 font-bold flex items-center gap-2">

                    <i class="ph-bold ph-sign-out"></i>
                    Keluar

                </button>

            </form>

        </div>

    </div>

</header>

<script>
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });
</script>
