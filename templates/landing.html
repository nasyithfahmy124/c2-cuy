{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - JejakDaya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        jejak: {
                            primary: '#1F4D3A',
                            secondary: '#6B8F71',
                            accent: '#C76B4E',
                            bg: '#F7F3EA',
                            text: '#1F2933',
                        },
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 8s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-14px)' },
                        }
                    }
                },
            },
        }
    </script>

    <style>
        .glass-pill {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>

<body class="min-h-screen relative overflow-hidden bg-jejak-bg font-sans text-white selection:bg-jejak-accent selection:text-white">

    <div class="absolute inset-0 -z-10">
        <img
            src="{% static 'assets/img/mobile_bg.png' %}"
            alt=""
            class="block md:hidden w-full h-full object-cover object-center"
        >
        <img
            src="{% static 'assets/img/dakstop_bg.png' %}"
            alt=""
            class="hidden md:block w-full h-full object-cover object-center"
        >

        <div class="absolute inset-0 bg-gradient-to-b from-jejak-primary/75 via-jejak-primary/60 to-jejak-primary/85"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(107,143,113,0.25),transparent_32%),radial-gradient(circle_at_bottom_left,rgba(199,107,78,0.18),transparent_28%)]"></div>
    </div>

    <div class="absolute top-10 right-[-8rem] w-[28rem] h-[28rem] bg-jejak-secondary/25 rounded-full blur-[110px] animate-float pointer-events-none"></div>
    <div class="absolute bottom-[-6rem] left-[-6rem] w-[22rem] h-[22rem] bg-jejak-accent/20 rounded-full blur-[100px] animate-float pointer-events-none"></div>

    <header class="px-6 pt-6 md:px-10 md:pt-8 z-10 opacity-0 animate-fade-in-up">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-white/10 border border-white/10 flex items-center justify-center">
                <i class="ph-fill ph-leaf text-xl text-jejak-secondary"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">JejakDaya</span>
        </div>
    </header>

    <main class="relative z-10 flex-1 flex items-center px-6 md:px-10 lg:px-16 py-10">
        <div class="w-full max-w-7xl mx-auto">
            <div class="max-w-2xl">
                <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-semibold leading-[1.08] tracking-tight mb-5">
                    <span class="block opacity-0 animate-fade-in-up delay-100">Kendalikan</span>
                    <span class="block opacity-0 animate-fade-in-up delay-200">Semua Kebaikan</span>
                    <span class="block opacity-0 animate-fade-in-up delay-300">dalam Satu Tempat</span>
                </h1>

                <p class="text-white/80 text-base sm:text-lg md:text-xl font-medium max-w-md opacity-0 animate-fade-in-up delay-300">
                    Platform terpadu untuk memonitor, menyalurkan, dan mengelola dampak positif Anda.
                </p>
            </div>
        </div>
    </main>

    <footer class="relative z-10 px-6 pb-8 md:px-10 md:pb-10 opacity-0 animate-fade-in-up delay-300">
        <div class="mx-auto w-full max-w-md">
            <div class="glass-pill rounded-full p-2 flex items-center justify-between shadow-2xl transition-all hover:bg-white/12">
                <button
                    type="button"
                    class="w-12 h-12 flex items-center justify-center rounded-full text-white/55 hover:text-white hover:bg-white/10 transition-colors"
                    aria-label="Kembali"
                >
                    <i class="ph ph-arrow-left text-xl"></i>
                </button>

                <a href="{% url 'login' %}" class="flex-grow flex items-center justify-center gap-3 group pr-2">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-jejak-primary group-hover:scale-110 transition-transform duration-300 shadow-[0_0_20px_rgba(255,255,255,0.25)]">
                        <i class="ph-fill ph-play text-xl ml-1"></i>
                    </div>

                    <span class="font-semibold text-lg tracking-wide group-hover:text-jejak-secondary transition-colors">
                        Mulai
                    </span>

                    <span class="flex items-center text-white/40 group-hover:text-white/80 transition-colors transform group-hover:translate-x-2 duration-300">
                        <i class="ph-bold ph-caret-right text-xs"></i>
                        <i class="ph-bold ph-caret-right text-xs -ml-1"></i>
                        <i class="ph-bold ph-caret-right text-xs -ml-1"></i>
                    </span>
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
