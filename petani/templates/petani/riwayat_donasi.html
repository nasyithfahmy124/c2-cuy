<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 class="text-2xl font-bold mb-6">Riwayat Donasi Masuk</h2>
    
    {% for d in riwayat %}
    <div class="bg-white p-5 rounded-xl shadow mb-4">
    
        <p class="text-sm text-gray-400">Donatur</p>
        <p class="font-bold text-green-700">
            {{ d.donatur.username }}
        </p>
    
        <p class="text-sm text-gray-400 mt-2">Project</p>
        <p class="font-semibold">
            {{ d.project.nama }}
        </p>
    
        <p class="text-sm text-gray-400 mt-2">Jumlah</p>
        <p class="text-lg font-bold text-jejak-primary">
            Rp {{ d.jumlah }}
        </p>
    
        <p class="text-xs text-gray-400 mt-2">
            {{ d.tanggal }}
        </p>
    
    </div>
    {% empty %}
    <p class="text-gray-400">Belum ada donasi masuk</p>
    {% endfor %}
</body>
</html>
